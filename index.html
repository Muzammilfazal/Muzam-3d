<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muzam 3D - Web Animation & Modeling</title>
    <meta name="description" content="Modern web-based 3D animation and modeling application">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    
    <!-- Three.js and OrbitControls -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://unpkg.com/mp4-muxer@5.1.3/build/mp4-muxer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#09090b', // zinc-950
                            800: '#18181b', // zinc-900
                            700: '#27272a', // zinc-800
                            600: '#3f3f46', // zinc-700
                            500: '#52525b', // zinc-600
                        },
                        primary: '#6366f1' // indigo-500
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
    @layer utilities {
        .panel-bg { @apply bg-dark-800 border-dark-700; }
        .btn-toolbar { @apply p-1.5 rounded-md hover:bg-dark-700 text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm; }
        .input-dark { @apply bg-dark-900 border border-dark-700 rounded-md px-3 py-1.5 text-sm text-white w-full focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow; }
        .label-sm { @apply text-xs font-medium text-gray-400 mb-1.5 block uppercase tracking-wider; }
    }
    body {
        @apply bg-dark-900 text-white overflow-hidden font-sans;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    
    @keyframes float-slow {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
    }
    @keyframes float-medium {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(10deg); }
    }
    @keyframes float-fast {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-40px) rotate(-10deg); }
    }
    @keyframes pulse-glow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
    }
    .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }
    .animate-float-medium { animation: float-medium 4s ease-in-out infinite; }
    .animate-float-fast { animation: float-fast 3s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 5s ease-in-out infinite; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    
    /* Remove number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type="number"] {
        -moz-appearance: textfield;
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="store/SceneContext.js"></script>
    <script type="text/babel" src="components/TopBar.js"></script>
    <script type="text/babel" src="components/LeftPanel.js"></script>
    <script type="text/babel" src="components/RightPanel.js"></script>
    <script type="text/babel" src="components/Timeline.js"></script>
    <script type="text/babel" src="components/Viewport.js"></script>
    <script type="text/babel" src="components/RenderModal.js"></script>
    <script type="text/babel" src="components/SplashScreen.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
